# ~/.config/hypr/modules/envvars.conf
# Environment variables for Hyprland session

# Cursor 
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

# Wayland backends 
env = GDK_BACKEND,wayland,x11,*          # GTK: prefer Wayland, fallback X11
env = SDL_VIDEODRIVER,wayland            # SDL2 games/apps run natively on Wayland
env = CLUTTER_BACKEND,wayland

# Qt 
env = QT_QPA_PLATFORM,wayland;xcb        # Qt: prefer Wayland, fallback XCB
env = QT_AUTO_SCREEN_SCALE_FACTOR,1     # Qt DPI auto-scaling
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # No client-side decorations on Qt apps
env = QT_QPA_PLATFORMTHEME,kde      # Use KDE for Qt platform theme (reads kdeglobals)
env = QT_STYLE_OVERRIDE,kvantum    # Force Kvantum style for Qt applications

# Firefox / Mozilla 
env = MOZ_ENABLE_WAYLAND,1              # Native Wayland rendering in Firefox

# Electron apps (VSCode, Discord, Obsidian …) 
env = ELECTRON_OZONE_PLATFORM_HINT,auto # Electron 28+: auto-detect Wayland/X11

# Java / Swing 
env = _JAVA_AWT_WM_NONREPARENTING,1    # Fixes blank/black Java GUI windows

#  XDG 
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SCREENSHOTS_DIR,$HOME/Pictures/Screenshots
env = XDG_MENU_PREFIX,plasma-

# Misc 
# OZONE_PLATFORM intentionally omitted — GDK_BACKEND handles Wayland preference;
# forcing OZONE can break some Electron/Chromium apps on mixed setups

# Proton path
PROTONPATH="/home/m_frost/.local/share/proton-ge/GE-Proton11-1"
